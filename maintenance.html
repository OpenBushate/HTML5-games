<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Maintenance</title>
  <link rel="stylesheet" href="style.css">
  <meta name="robots" content="noindex">
  <style>
  body {
    overflow: hidden;
  }
</style>

</head>
<body>
  <main style="max-width:820px;margin:3rem auto;padding:1.5rem;text-align:center;">
    <h1>Maintenance😭</h1>

    <p>We're temporarily offline for maintenance. In the meantime, enjoy an ad from our sponsor — North Face.</p>

    <div class="video" style="margin-top:14px;">
      <video 
        id="maintenanceVideo"
        muted 
        loop 
        playsinline 
        preload="auto"
        style="width:100%;height:480px;border-radius:6px;background:#000;object-fit:cover;">
        
        <source src="/h264.mp4" type="video/mp4">
        Your browser does not support the video tag.
        
      </video>
    </div>

    <p style="margin-top:12px;color:#666;font-size:0.95rem;">
      We'll be back shortly — thanks for your patience.
    </p>
  </main>

  <script>
    window.addEventListener("load", function() {
      const video = document.getElementById("maintenanceVideo");
      
      setTimeout(() => {
        video.play();
      }, 1000); 
    });
  </script>

</body>
</html>
