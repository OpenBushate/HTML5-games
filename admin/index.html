<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Panel</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;padding:20px}
      .box{max-width:800px;margin:0 auto}
      textarea{width:100%;height:120px}
      input,button,textarea{padding:8px;margin:6px 0}
      .top{display:flex;justify-content:space-between;align-items:center}
    </style>
  </head>
  <body>
    <div class="box">
      <div class="top">
        <h1>Admin Panel</h1>
        <form id="logoutForm" method="POST" action="/admin/logout"><button>Logout</button></form>
      </div>

      <section>
        <h3>Send Announcement</h3>
        <form id="announceForm">
          <label>Message</label>
          <textarea name="message" required></textarea>
          <label>Display duration (ms)</label>
          <input name="duration" type="number" value="8000" />
          <div>
            <button type="submit">Announce to all clients</button>
          </div>
        </form>
        <div id="status" style="margin-top:8px;color:green"></div>
      </section>
    </div>

    <script>
      document.getElementById('announceForm').addEventListener('submit', async (e)=>{
        e.preventDefault();
        const fd = new FormData(e.target);
        const body = { message: fd.get('message'), duration: fd.get('duration') };
        const res = await fetch('/admin/announce', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
        const status = document.getElementById('status');
        if (res.ok) { status.textContent = 'Announcement sent'; setTimeout(()=>status.textContent='',3000);} else { const j = await res.json().catch(()=>({})); status.style.color='red'; status.textContent = j?.error || 'Failed'; }
      });
    </script>
  </body>
</html>
