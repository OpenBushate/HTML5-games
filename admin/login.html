<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Admin Login</title>
    <style>
      body{font-family:Arial,Helvetica,sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
      .card{width:320px;padding:20px;border:1px solid #ddd;border-radius:8px}
      input{width:100%;padding:8px;margin:6px 0}
      button{width:100%;padding:8px}
      .error{color:#c00}
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Admin Login</h2>
      <form method="POST" action="/admin/login">
        <label>Username</label>
        <input name="username" required autocomplete="username" />
        <label>Password</label>
        <input name="password" type="password" required autocomplete="current-password" />
        <button type="submit">Sign in</button>
      </form>
      <p class="error">%ERROR%</p>
      <p style="margin-top:12px;font-size:12px;color:#666">Default credentials: <code>admin</code>/<code>password</code>. Set env vars `ADMIN_USER` and `ADMIN_PASS`.</p>
    </div>
  </body>
  <script>
    const url = new URL(location.href);
    if (url.searchParams.get('error')) document.querySelector('.error').textContent = 'Invalid credentials';
    else document.querySelector('.error').textContent = '';
  </script>
</html>
